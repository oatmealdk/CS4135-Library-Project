<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Library — Catalogue search</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>E-Library test UI</h1>
        <p class="muted">
          Catalogue search uses <strong>search-service</strong> (:8085), which calls <strong>book-service</strong> via Eureka.
          Leave filters empty and click Search to <strong>browse</strong> the first page.
        </p>
      </header>

      <section class="card">
        <h2>Catalogue search</h2>
        <form id="search-form" class="grid">
          <label>Title <input type="text" name="title" placeholder="optional" /></label>
          <label>Author <input type="text" name="author" placeholder="optional" /></label>
          <label>Keyword <input type="text" name="keyword" placeholder="filters result list" /></label>
          <label>Page <input type="number" name="page" value="0" min="0" /></label>
          <label>Size <input type="number" name="size" value="20" min="1" max="100" /></label>
          <button type="submit">Search</button>
        </form>
        <p id="search-summary" class="muted"></p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Year</th>
                <th>Available</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="search-results"></tbody>
          </table>
        </div>
        <p id="search-error" class="error"></p>
      </section>

      <section class="card">
        <h2>Trigger borrow (optional)</h2>
        <form id="borrow-form" class="row">
          <label>userId <input type="number" name="userId" value="1" min="1" required /></label>
          <label>bookId <input type="number" name="bookId" value="1" min="1" required /></label>
          <button type="submit">POST /api/borrows</button>
        </form>
        <pre id="borrow-out" class="out"></pre>
        <p id="borrow-error" class="error"></p>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
