version: '3.8'

services:

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: elibrary-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # eureka server for service discovery
  eureka-server:
    build:
      context: ./backend/eureka-server
      dockerfile: Dockerfile
    container_name: elibrary-eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8761/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  # config server for centralised config
  config-server:
    build:
      context: ./backend/config-server
      dockerfile: Dockerfile
    container_name: elibrary-config
    ports:
      - "8888:8888"
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  # user service for user authentication and management
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    container_name: elibrary-user
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: ${USER_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      EUREKA_URI: http://eureka-server:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  # borrowing service for borrowing and returning books
  borrowing-service:
    build:
      context: ./backend/borrowing-service
      dockerfile: Dockerfile
    container_name: elibrary-borrowing
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: ${BORROWING_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      EUREKA_URI: http://eureka-server:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # book catalogue service for managing books and storing book details
  book-service:
    build:
      context: ./backend/book-service
      dockerfile: Dockerfile
    container_name: elibrary-book
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: ${BOOK_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      EUREKA_URI: http://eureka-server:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # search service — catalogue search/browse via book-service (Eureka)
  search-service:
    build:
      context: ./backend/search-service
      dockerfile: Dockerfile
    container_name: elibrary-search
    ports:
      - "8085:8085"
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy

  # notification service for sending notifications to users
  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: elibrary-notification
    ports:
      - "8084:8084"
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-guest}
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    profiles:
      - full
