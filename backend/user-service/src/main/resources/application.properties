spring.application.name=user-service
server.port=8081

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Supabase pooler (session mode) has a low max client limit — keep pool small per service
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# HS256: use a secret of at least 32 bytes (set JWT_SECRET in env or .env for Docker)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# service discovery import
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# centralised config import
spring.config.import=${SPRING_CONFIG_IMPORT:optional:configserver:http://localhost:8888}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
