# ─── Book Service – centralised config ───────────────────────────────────────

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

resilience4j.circuitbreaker.instances.borrowingService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.borrowingService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.borrowingService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.borrowingService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.borrowingService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.borrowingService.permittedNumberOfCallsInHalfOpenState=3
