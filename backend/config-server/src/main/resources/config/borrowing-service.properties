# ─── Borrowing Service – centralised config (C3) ─────────────────────────────
# Sensitive credentials (DB password, RabbitMQ pass) are NOT stored here;
# they are injected as container environment variables via docker-compose.

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Borrowing domain constants (configurable per environment)
borrowing.max-concurrent-borrows=5
borrowing.max-renewals=3
borrowing.loan-period-days=14
borrowing.fine-daily-rate=0.50
borrowing.fine-grace-period-days=1

# Resilience4j circuit-breaker defaults (C4)
resilience4j.circuitbreaker.instances.bookService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.bookService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.bookService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.bookService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.bookService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.bookService.permittedNumberOfCallsInHalfOpenState=3

resilience4j.circuitbreaker.instances.userService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.userService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.userService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.userService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.userService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.userService.permittedNumberOfCallsInHalfOpenState=3

resilience4j.retry.instances.bookService.maxAttempts=3
resilience4j.retry.instances.bookService.waitDuration=500ms

resilience4j.retry.instances.userService.maxAttempts=3
resilience4j.retry.instances.userService.waitDuration=500ms

resilience4j.timelimiter.instances.bookService.timeoutDuration=3s
resilience4j.timelimiter.instances.userService.timeoutDuration=3s
